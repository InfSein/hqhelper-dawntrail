name: Build, Deploy and Release

on:
  push:
    branches:
      - master

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:

  # =========================
  # 1. Build
  # =========================
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      # 上传给 Pages 使用
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      # 上传给 Release 使用
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-dist
          path: ./dist


  # =========================
  # 2. Deploy to GitHub Pages
  # =========================
  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4


  # =========================
  # 3. Create / Update Release
  # =========================
  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-dist
          path: dist

      - name: Zip static files
        run: zip -r static-pages.zip dist

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Get previous tag
        id: prev_tag
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "PREV_TAG=$PREV_TAG" >> $GITHUB_ENV

      - name: Check if release exists
        id: check_release
        run: |
          if gh release view "v${{ env.VERSION }}" > /dev/null 2>&1; then
            echo "EXISTS=true" >> $GITHUB_ENV
          else
            echo "EXISTS=false" >> $GITHUB_ENV
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Release Notes
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: .github/cliff.toml
          args: ${{ env.EXISTS == 'true' && '--latest' || '--unreleased' }} --strip header
        env:
          OUTPUT: CHANGELOG_AUTO.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Create or update release
        run: |
          if [ ! -f CHANGELOG_AUTO.md ]; then
            touch CHANGELOG_AUTO.md
          fi

          echo "" >> CHANGELOG_AUTO.md
          echo "Please refer the [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/master/CHANGELOG.md) for details." >> CHANGELOG_AUTO.md
          echo "" >> CHANGELOG_AUTO.md
          echo "**Since last release**: https://github.com/${{ github.repository }}/compare/${{ env.PREV_TAG }}...v${{ env.VERSION }}" >> CHANGELOG_AUTO.md

          if [ "${{ env.EXISTS }}" = "true" ]; then
            gh release upload "v${{ env.VERSION }}" static-pages.zip --clobber
            gh release edit "v${{ env.VERSION }}" --notes-file CHANGELOG_AUTO.md
          else
            gh release create "v${{ env.VERSION }}" static-pages.zip \
              --title "Release v${{ env.VERSION }}" \
              --notes-file CHANGELOG_AUTO.md
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}